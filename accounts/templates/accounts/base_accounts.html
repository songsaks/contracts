{% load static %}
<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
    <!-- ① Accounts uses Light Mode Only -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}User Management — 9Com{% endblock %}</title>
    <!-- ② Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- ③ 9Com Design System -->
    <link rel="stylesheet" href="{% static 'css/theme.css' %}">
    <!-- ④ Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* accounts uses light theme by default; tokens from theme.css */
        body {
            background-color: var(--t-bg);
            color: var(--t-text);
            min-height: 100vh;
        }

        .navbar-custom {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-soft);
            padding: 1rem 0;
        }
        
        .navbar-brand {
            font-weight: 800;
            color: var(--accent-primary) !important;
            font-size: 1.4rem;
        }

        .nav-link { font-weight: 600; color: #64748b !important; padding: 0.5rem 1.25rem !important; transition: all 0.2s; }
        .nav-link:hover, .nav-link.active { color: var(--accent-primary) !important; }

        .card-premium {
            background: var(--card-white);
            border: 1px solid var(--border-soft);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white; border: none; border-radius: 10px;
            font-weight: 600; padding: 0.6rem 1.5rem; transition: transform 0.2s;
        }
        .btn-premium:hover { transform: translateY(-1px); color: white; opacity: 0.95; }
        
        /* User Header */
        .page-header { background: white; border-bottom: 1px solid var(--border-soft); padding: 2rem 0; margin-bottom: 2rem; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top navbar-custom">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'accounts:user_list' %}">
                <i class="fas fa-users-cog"></i>
                <span>USER MGMT</span>
            </a>
            
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
                <i class="fas fa-bars"></i>
            </button>

            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item">
                        <a class="nav-link {% if '/accounts/' in request.path and '/add/' not in request.path %}active{% endif %}" href="{% url 'accounts:user_list' %}">
                            <i class="fas fa-list me-2"></i>รายชื่อพนักงาน
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if '/add/' in request.path %}active{% endif %}" href="{% url 'accounts:user_create' %}">
                            <i class="fas fa-user-plus me-2"></i>เพิ่มพนักงาน
                        </a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <a href="/" class="btn btn-outline-secondary btn-sm rounded-pill px-3">
                        <i class="fas fa-home me-1"></i> หน้าหลักระบบ
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
