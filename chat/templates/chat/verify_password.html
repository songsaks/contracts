{% extends 'base.html' %}
{% load static %}

{% block title %}ความปลอดภัยและการยืนยันตัวตน | 9Com{% endblock %}

{% block content %}
<div class="container py-10">
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
        <div class="p-8 text-center bg-slate-50 border-bottom">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-shield-alt fa-2x"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">ยืนยันรหัสผ่านเพื่อดำเนินการ</h1>
            <p class="text-slate-500 text-sm mt-2">กรุณาระบุรหัสผ่านเพื่อยืนยันสิทธิ์ในการดำเนินการครั้งนี้</p>
        </div>

        <div class="p-8">
            <form method="post" id="verify-form">
                {% csrf_token %}
                <div class="mb-6">
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-2">รหัสผ่านยืนยัน</label>
                    <input type="password" id="password" name="password" required 
                           class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"
                           placeholder="ระบุรหัสผ่านที่นี่...">
                </div>

                <div class="flex flex-col gap-3">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-200">
                        ยืนยันความถูกต้อง
                    </button>
                    <a href="javascript:history.back()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition text-center">
                        ยกเลิก
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
