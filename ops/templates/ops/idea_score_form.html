{% extends 'ops/base_ops.html' %}

{% block content %}
<div class="container-fluid px-4 py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-dark py-4 px-4 text-center">
                    <h4 class="text-white fw-bold mb-0"><i class="fas fa-star text-warning me-2"></i>Scoring Idea</h4>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-info border-0 rounded-3 mb-4">
                        <h6 class="fw-bold mb-1">ไอเดีย: {{ idea.title }}</h6>
                        <p class="small mb-0">{{ idea.description|truncatewords:30 }}</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label d-flex justify-content-between align-items-center">
                                <span class="fw-bold text-dark">Impact Score (คะแนนผลกระทบ)</span>
                                <span id="impactVal" class="badge bg-primary rounded-pill">5</span>
                            </label>
                            <input type="range" name="impact_score" class="form-range" min="1" max="10" step="1" value="{{ idea.impact_score|default:5 }}" oninput="document.getElementById('impactVal').innerText = this.value; calculateTotal();">
                            <div class="d-flex justify-content-between small text-muted mt-1">
                                <span>ต่ำ</span>
                                <span>สูงมาก</span>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label d-flex justify-content-between align-items-center">
                                <span class="fw-bold text-dark">Feasibility Score (ความเป็นไปได้)</span>
                                <span id="feasibilityVal" class="badge bg-success rounded-pill">5</span>
                            </label>
                            <input type="range" name="feasibility_score" class="form-range" min="1" max="10" step="1" value="{{ idea.feasibility_score|default:5 }}" oninput="document.getElementById('feasibilityVal').innerText = this.value; calculateTotal();">
                            <div class="d-flex justify-content-between small text-muted mt-1">
                                <span>ยากมาก</span>
                                <span>ทำได้ง่าย</span>
                            </div>
                        </div>

                        <div class="bg-light p-4 rounded-4 text-center mb-5 border">
                            <div class="text-muted small mb-1 fw-bold">TOTAL SCORE</div>
                            <h1 id="totalScore" class="fw-black text-dark mb-0">10</h1>
                            <div class="text-muted text-xs">/ 20 คะแนน</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-dark btn-lg rounded-pill shadow">บันทึกคะแนน</button>
                            <a href="{% url 'ops:meeting_detail' idea.meeting.id %}" class="btn btn-link text-muted">ย้อนกลับ</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function calculateTotal() {
        const i = parseInt(document.getElementsByName('impact_score')[0].value);
        const f = parseInt(document.getElementsByName('feasibility_score')[0].value);
        document.getElementById('totalScore').innerText = i + f;
    }
    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('impactVal').innerText = document.getElementsByName('impact_score')[0].value;
        document.getElementById('feasibilityVal').innerText = document.getElementsByName('feasibility_score')[0].value;
        calculateTotal();
    });
</script>
{% endblock %}
