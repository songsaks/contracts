{% extends "ops/base_ops.html" %}

{% block title %}Report Progress — {{ goal.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <a href="{% url 'ops:dashboard' %}" class="btn btn-link text-muted mb-3 px-0">
            <i class="fas fa-arrow-left me-2"></i> กลับหน้าหน้าหลัก
        </a>
        
        <div class="card card-premium p-4 border-0 shadow-lg">
            <h4 class="fw-bold mb-1">บันทึกความคืบหน้า</h4>
            <p class="text-muted small mb-4">{{ goal.title }} (เป้า: {{ goal.target_value }} {{ goal.unit }})</p>
            
            <form action="" method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label fw-bold small text-uppercase">จำนวนที่ทำได้จริงในวันนี้ ({{ goal.unit }})</label>
                    <input type="number" step="0.01" name="actual_value" class="form-control form-control-lg rounded-3 border-light bg-light" placeholder="ระบุตัวเลข..." required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold small text-uppercase">หมายเหตุ / อุปสรรคที่พบ</label>
                    <textarea name="note" rows="3" class="form-control rounded-3 border-light bg-light" placeholder="บอกปัญหาที่เจอเพื่อให้ AI และหัวหน้าช่วยวิเคราะห์..."></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold small text-uppercase">รูปถ่ายหน้างาน (ถ้ามี)</label>
                    <input type="file" name="image" class="form-control rounded-3 border-light bg-light" accept="image/*" capture="environment">
                    <div class="form-text small">กดที่นี่เพื่อถ่ายรูปจากกล้องมือถือได้ทันที</div>
                </div>

                <button type="submit" class="btn btn-premium w-100 py-3 shadow">
                    <i class="fas fa-paper-plane me-2"></i> ส่งรายงานผลงาน
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
