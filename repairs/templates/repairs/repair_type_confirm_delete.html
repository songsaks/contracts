{% extends 'repairs/base_repairs.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4 text-center">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="mb-4">
                    <i class="fas fa-exclamation-triangle text-warning fa-4x"></i>
                </div>
                <h3 class="fw-bold mb-3">ยืนยันการลบ?</h3>
                <p class="text-muted mb-4">คุณแน่ใจว่าต้องการลบประเภทงานซ่อมข <strong>"{{ object.name }}"</strong>? ข้อมูลงานซ่อมที่เชื่อมโยงอยู่จะไม่ถูกลบ แต่จะไม่มีประเภทระบุไว้</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger py-3 rounded-pill shadow-sm fw-bold">
                            <i class="fas fa-trash-alt me-2"></i>ยืนยันลบข้อมูล
                        </button>
                        <a href="{% url 'repairs:repair_type_list' %}" class="btn btn-light py-3 rounded-pill">
                            ยกเลิก
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
